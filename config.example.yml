channels:
  - streamer_one
  - streamer_two

check_interval_seconds: 60
max_concurrent_streams: 2
headless: true
storage_state_path: /data/browser-state/storage-state.json
log_level: info

browser:
  navigation_timeout_ms: 30000
  page_health_check_interval_seconds: 60
  reward_check_interval_seconds: 30
  page_refresh_interval_seconds: 300
  restart_on_crash: true
  stream_quality: 160p
  enforce_stream_quality_seconds: 120
  viewport_width: 1280
  viewport_height: 720
  mute_audio: true
  block_images: false
  block_fonts: false
  block_known_tracking: false
  resource_telemetry_interval_seconds: 300
