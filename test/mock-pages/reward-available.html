<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title>Reward available</title>
  </head>
  <body>
    <main>
      <section data-test-selector="community-points-summary">
        <span>1,250</span>
        <button
          type="button"
          data-test-selector="community-points-claim-button"
          data-click-count="0"
        >
          Reclamar bonificacion
        </button>
      </section>
    </main>
    <script>
      const button = document.querySelector(
        '[data-test-selector="community-points-claim-button"]',
      );
      button.addEventListener('click', () => {
        const count = Number(button.dataset.clickCount);
        button.dataset.clickCount = String(count + 1);
      });
    </script>
  </body>
</html>
